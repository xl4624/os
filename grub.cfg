set timeout=0
set timeout_style=hidden

menuentry "myos" {
    multiboot /boot/myos.bin
    module /boot/sh.elf sh.elf
    module /boot/hello.elf hello.elf
    module /boot/tetris.elf tetris.elf
    module /boot/shm_test.elf shm_test.elf
    if [ -f (cd0)/boot/doom1.wad ]; then
        module /boot/doom1.wad doom1.wad
    fi
    boot
}
